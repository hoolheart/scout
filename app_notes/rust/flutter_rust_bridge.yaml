# flutter_rust_bridge_codegen configuration file
# See: https://cjycode.com/flutter_rust_bridge/

# Rust input
rust_input: crate::api

# Dart output
dart_output: lib/src/rust/api

# Additional dart output for web support
# dart_output_extra: lib/src/rust/api

# C output (for iOS/Android native builds)
c_output: ios/Runner/bridge_generated.h

# Swift output for iOS
swift_output: ios/Runner/bridge_generated.swift

# Kotlin output for Android
kotlin_output: android/app/src/main/kotlin/com/example/app_notes/bridge_generated.kt

# C# output for Windows
c_output_extra: windows/bridge_generated.h

# Dart FFI bridge
dart_decl_output: lib/src/rust/api/bridge_definitions.dart

# Build web with wasm
wasm: true

# Run build_runner after generation
build_runner: true
