name: app_notes
description: "AppNotes - A modern Markdown editor for desktop"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Core dependencies
  flutter_rust_bridge: ^2.0.0
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.5.0
  file_picker: ^10.3.10
  flutter_code_editor: ^0.3.0
  flutter_markdown: ^0.7.7+1
  window_manager: ^0.5.1
  url_launcher: ^6.2.0
  
  # Utilities
  path: ^1.8.3
  path_provider: ^2.1.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # Settings persistence
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code generation
  riverpod_generator: ^2.5.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  
  # Linting
  very_good_analysis: ^10.2.0

  # Packaging
  msix: ^3.16.0

flutter:
  uses-material-design: true
  
  # Application icons for all platforms
  # Windows: windows/runner/resources/app_icon.ico
  # macOS: macos/Runner/Assets.xcassets/AppIcon.appiconset/
  # Linux: assets/icons/app_icon.png

msix_config:
  display_name: AppNotes
  publisher_display_name: AppNotes Team
  identity_name: com.appnotes.editor
  msix_version: 1.0.0.0
  logo_path: assets/icons/app_icon.png
  capabilities: internetClient
